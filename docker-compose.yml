services:
  db:
    image: postgres:16
    container_name: diet_pet-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - diet_pet_pg:/var/lib/postgresql/data

volumes:
  diet_pet_pg: